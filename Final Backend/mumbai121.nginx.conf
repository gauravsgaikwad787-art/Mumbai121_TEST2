# ============================================================
#  Nginx configuration for Mumbai121
#  File location: /etc/nginx/sites-available/mumbai121
#
#  After placing this file run:
#    sudo ln -s /etc/nginx/sites-available/mumbai121 /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
# ============================================================

# Rate limiting zone — limits each IP to 10 requests/sec
# Protects against bursts from bots or accidental hammering
limit_req_zone $binary_remote_addr zone=mumbai121_limit:10m rate=10r/s;

server {
    listen 80;
    server_name www.mumbai121.com mumbai121.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.mumbai121.com mumbai121.com;

    # ── SSL (managed by Certbot / Let's Encrypt) ──────────────
    ssl_certificate     /etc/letsencrypt/live/mumbai121.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mumbai121.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SECURITY HEADERS ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── FILE UPLOAD SIZE ──────────────────────────────────────
    # Must be >= MAX_FILE_SIZE in main.py (currently 5 MB)
    # Set slightly higher to account for multipart form overhead
    client_max_body_size 10M;

    # ── TIMEOUTS (must be >= Gunicorn timeout) ─────────────────
    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── PROXY TO GUNICORN ─────────────────────────────────────
    location /api/ {
        # Apply rate limiting — burst of 20 allows short spikes
        limit_req zone=mumbai121_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Pass CORS to FastAPI — do not duplicate headers here
        proxy_pass_header Access-Control-Allow-Origin;
    }

    # ── STATIC FILES (HTML, CSS, JS, images) ──────────────────
    location / {
        root  /var/www/mumbai121;
        index home.html;
        try_files $uri $uri/ =404;

        # Cache static assets aggressively
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires    30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── HEALTH CHECK ──────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # ── LOGGING ───────────────────────────────────────────────
    access_log /var/log/nginx/mumbai121_access.log;
    error_log  /var/log/nginx/mumbai121_error.log;
}